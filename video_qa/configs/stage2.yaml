# Stage 2: image QA. Projector (from stage 1) + LoRA on the LLM.
output_dir: runs/stage2

encoder:
  arch: vit_large
  checkpoint: checkpoints/vitl.pt
  img_size: 256
  num_frames: 8
  frame_step: 4
  spatial_pool_stride: 2

llm:
  name: Qwen/Qwen2.5-7B-Instruct
  load_in_4bit: true
  use_lora: true
  lora_r: 64
  lora_alpha: 128
  lora_dropout: 0.05
  lora_init_from: null

projector:
  hidden_dim: 2048
  init_from: runs/stage1/projector.pt

data:
  json: data/llava_instruct_150k.json
  media_root: data/coco

optim:
  lr: 2.0e-4
  epochs: 3
  batch_size: 2
  grad_accum: 8                 # effective batch 16
  warmup_ratio: 0.03
  weight_decay: 0.0
  num_workers: 4
  log_every: 10
